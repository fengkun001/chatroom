<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 星尘聊天室</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.18.3/index.js"></script>
    <style>
        :root {
            --bg-primary: #080014;
            --bg-secondary: #120a22;
            --border: #2e1e4a;
            --text: #e0d0ff;
            --text-dim: #6b5080;
            --accent: #7c3aed;
            --accent-light: #a78bfa;
            --bubble-self: linear-gradient(135deg, #3b0764, #5b21b6);
            --bubble-other: rgba(28, 12, 46, 0.9);
            --danger: #ef4444;
            --success: #10b981;
            --glow: 0 0 20px rgba(124, 58, 237, 0.4);
            --transition: 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        canvas#starfield {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 0;
        }

        .page {
            display: none; width: 100%; height: 100vh;
            position: relative; z-index: 1;
        }
        .page.active { display: flex; }

        /* 登录/注册卡片 */
        .auth-overlay {
            display: flex; align-items: center; justify-content: center;
            width: 100%; background: transparent;
        }
        .auth-card {
            background: rgba(18, 10, 34, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px; padding: 48px 40px; width: 420px;
            box-shadow: var(--glow);
            animation: cardIn 0.5s ease;
        }
        @keyframes cardIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .auth-card h1 { text-align: center; color: var(--accent-light); margin-bottom: 8px; font-size: 28px; }
        .auth-subtitle { text-align: center; color: var(--text-dim); margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--accent-light); font-size: 14px; }
        .form-group input {
            width: 100%; padding: 12px 16px;
            background: rgba(8, 0, 20, 0.6); border: 1px solid var(--border);
            border-radius: 12px; color: white; font-size: 15px;
            outline: none; transition: border-color var(--transition), box-shadow var(--transition);
        }
        .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(124,58,237,0.3); }
        .error-msg { color: var(--danger); font-size: 14px; min-height: 20px; text-align: center; margin: 8px 0; }
        .btn-primary {
            width: 100%; padding: 14px; background: var(--accent);
            border: none; border-radius: 12px; color: white;
            font-size: 16px; font-weight: bold; cursor: pointer;
            transition: all var(--transition); margin-bottom: 12px; letter-spacing: 1px;
        }
        .btn-primary:hover { background: #8b5cf6; box-shadow: 0 0 25px rgba(124,58,237,0.5); }
        .btn-ghost {
            width: 100%; padding: 12px; background: transparent;
            border: 1px solid var(--border); border-radius: 12px;
            color: var(--text-dim); cursor: pointer; transition: var(--transition);
        }
        .btn-ghost:hover { border-color: var(--accent); color: white; }
        .back-link { text-align: center; display: block; margin-top: 16px; color: var(--text-dim); cursor: pointer; }
        .back-link:hover { color: white; }

        /* 聊天主布局 */
        #chat-page.active { display: flex; flex-direction: row; height: 100vh; }

        /* 在线用户侧边栏 */
        .online-sidebar {
            width: 260px; background: rgba(15, 10, 30, 0.7);
            backdrop-filter: blur(12px); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 2; flex-shrink: 0;
        }
        .sidebar-header {
            padding: 20px; border-bottom: 1px solid var(--border);
            color: var(--accent-light); font-weight: bold;
            display: flex; align-items: center; gap: 8px;
        }
        .online-list { flex: 1; overflow-y: auto; padding: 12px; }
        .online-user {
            display: flex; align-items: center; gap: 10px;
            padding: 10px; border-radius: 8px; cursor: pointer;
            transition: background 0.2s;
        }
        .online-user:hover { background: rgba(124, 58, 237, 0.1); }
        .online-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--accent); display: flex; align-items: center;
            justify-content: center; font-weight: bold; color: white;
            font-size: 14px; border: 2px solid var(--accent-light);
            box-shadow: 0 0 10px rgba(124,58,237,0.3);
            background-size: cover; background-position: center;
        }
        .online-nickname { font-size: 14px; color: var(--text); }
        .online-status {
            width: 8px; height: 8px; background: var(--success);
            border-radius: 50%; margin-left: auto;
        }

        /* 聊天区域 */
        .chat-main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .chat-header {
            padding: 0 24px; height: 64px; display: flex; align-items: center;
            justify-content: space-between; background: rgba(15, 10, 30, 0.6);
            backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); z-index: 1;
        }
        .chat-header-left { display: flex; align-items: center; gap: 12px; }
        .header-logo { font-size: 24px; }
        .header-title { font-weight: bold; color: var(--accent-light); }
        .online-badge {
            background: rgba(124,58,237,0.2); padding: 4px 12px;
            border-radius: 20px; font-size: 13px; color: var(--accent-light);
        }
        .messages-area {
            flex: 1; overflow-y: auto; padding: 24px;
            display: flex; flex-direction: column; gap: 16px;
            scroll-behavior: smooth;
        }
        .messages-area::-webkit-scrollbar { width: 5px; }
        .messages-area::-webkit-scrollbar-track { background: transparent; }
        .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .message-item {
            display: flex; gap: 10px; max-width: 70%;
            animation: fadeInUp 0.25s ease;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message-item.self { align-self: flex-end; flex-direction: row-reverse; }
        .message-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--accent); display: flex; align-items: center;
            justify-content: center; font-weight: bold; font-size: 14px;
            flex-shrink: 0; border: 2px solid var(--accent-light);
            background-size: cover; background-position: center;
        }
        .message-item.self .message-avatar { background: #5b21b6; border-color: #a78bfa; }
        .message-content { display: flex; flex-direction: column; gap: 4px; }
        .message-meta { font-size: 12px; color: var(--text-dim); display: flex; gap: 6px; align-items: center; }
        .message-item.self .message-meta { justify-content: flex-end; }
        .message-bubble {
            padding: 10px 16px; border-radius: 18px; font-size: 15px;
            line-height: 1.5; word-break: break-word;
            background: var(--bubble-other); border: 1px solid var(--border); color: var(--text);
        }
        .message-item.self .message-bubble {
            background: var(--bubble-self); border-color: #6b21a8; color: white;
        }

        .input-area {
            padding: 16px 24px; background: rgba(15, 10, 30, 0.7);
            backdrop-filter: blur(12px); border-top: 1px solid var(--border);
            display: flex; gap: 12px; align-items: center; position: relative;
        }
        .input-area input {
            flex: 1; padding: 12px 18px; background: rgba(8,0,20,0.7);
            border: 1px solid var(--border); border-radius: 30px;
            color: white; font-size: 15px; outline: none; transition: 0.3s;
        }
        .input-area input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(124,58,237,0.3); }
        .btn-icon {
            background: transparent; border: 1px solid var(--border);
            color: var(--text-dim); width: 40px; height: 40px;
            border-radius: 50%; cursor: pointer; display: flex;
            align-items: center; justify-content: center; transition: 0.3s; font-size: 18px;
        }
        .btn-icon:hover { color: white; border-color: var(--accent); }
        .btn-send {
            padding: 12px 28px; background: var(--accent); border: none;
            border-radius: 30px; color: white; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
        .btn-send:hover { background: #8b5cf6; box-shadow: 0 0 20px rgba(124,58,237,0.5); }
        emoji-picker {
            position: absolute; bottom: 80px; right: 24px;
            z-index: 50; display: none; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* 个人信息页 */
        .profile-header {
            background: rgba(15, 10, 30, 0.7); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); padding: 0 24px; height: 64px;
            display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
        }
        .profile-body {
            flex: 1; overflow-y: auto; padding: 32px 24px;
            display: flex; flex-direction: column; gap: 24px;
            max-width: 720px; margin: 0 auto; width: 100%;
        }
        .info-card {
            background: rgba(18, 10, 34, 0.7); border: 1px solid var(--border);
            border-radius: 16px; padding: 24px;
        }
        .info-card h3 { color: var(--accent-light); margin-bottom: 16px; }
        .avatar-upload {
            display: flex; align-items: center; gap: 20px; margin-bottom: 20px;
        }
        .avatar-preview {
            width: 80px; height: 80px; border-radius: 50%;
            background: var(--accent); border: 2px solid var(--accent-light);
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: white; font-weight: bold;
            background-size: cover; background-position: center;
        }
        .upload-btn {
            padding: 8px 20px; background: transparent;
            border: 1px solid var(--accent); border-radius: 8px;
            color: var(--accent-light); cursor: pointer; transition: 0.3s;
        }
        .upload-btn:hover { background: var(--accent); color: white; }
        .profile-form { display: flex; flex-direction: column; gap: 14px; }
        .profile-form input {
            padding: 11px 16px; background: rgba(8,0,20,0.6);
            border: 1px solid var(--border); border-radius: 8px;
            color: white; outline: none; transition: 0.3s;
        }
        .profile-form input:focus { border-color: var(--accent); }
        .form-tip { font-size: 13px; min-height: 18px; }
        .form-tip.success { color: var(--success); }
        .form-tip.error { color: var(--danger); }
        .btn-save {
            padding: 10px 28px; background: var(--accent); border: none;
            border-radius: 8px; color: white; font-weight: bold;
            cursor: pointer; align-self: flex-start; transition: 0.3s;
        }
        .btn-save:hover { background: #8b5cf6; }
        .search-row { display: flex; gap: 10px; }
        .search-row input {
            flex: 1; padding: 11px 16px; background: rgba(8,0,20,0.6);
            border: 1px solid var(--border); border-radius: 8px; color: white;
        }
        .btn-search {
            padding: 11px 20px; background: rgba(124,58,237,0.3);
            border: 1px solid var(--accent); border-radius: 8px;
            color: white; cursor: pointer; white-space: nowrap;
        }
        .search-result {
            margin-top: 14px; padding: 16px; background: rgba(8,0,20,0.4);
            border: 1px solid var(--border); border-radius: 8px; display: none;
        }
        .search-result.show { display: block; }
    </style>
</head>
<body>

<canvas id="starfield"></canvas>

<!-- 欢迎页 -->
<div id="welcome-page" class="page active">
    <div class="auth-overlay">
        <div class="auth-card" style="text-align: center;">
            <div style="font-size: 64px;">✨</div>
            <h1>星尘聊天室</h1>
            <p style="color: var(--text-dim); margin: 12px 0 24px;">STARDUST CHAT · 让每一次对话都闪亮</p>
            <button class="btn-primary" id="btn-enter">进 入 星 尘</button>
        </div>
    </div>
</div>

<!-- 登录页 -->
<div id="login-page" class="page">
    <div class="auth-overlay">
        <div class="auth-card">
            <h1>🔮 登录</h1>
            <p class="auth-subtitle">欢迎回来，继续你的旅程</p>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="login-username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="login-password" placeholder="请输入密码">
            </div>
            <div class="error-msg" id="login-error"></div>
            <button class="btn-primary" id="btn-login">登 录</button>
            <button class="btn-ghost" id="btn-go-register">没有账号？去注册</button>
            <span class="back-link" id="btn-back-from-login">← 返回首页</span>
        </div>
    </div>
</div>

<!-- 注册页 -->
<div id="register-page" class="page">
    <div class="auth-overlay">
        <div class="auth-card">
            <h1>📝 注册</h1>
            <p class="auth-subtitle">加入星尘，开启对话</p>
            <div class="form-group">
                <label>用户名（用于登录）</label>
                <input type="text" id="reg-username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>昵称（聊天显示名称）</label>
                <input type="text" id="reg-nickname" placeholder="请输入昵称" maxlength="20">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="reg-password" placeholder="至少6位">
            </div>
            <div class="error-msg" id="register-error"></div>
            <button class="btn-primary" id="btn-register">注 册</button>
            <button class="btn-ghost" id="btn-go-login">已有账号？去登录</button>
            <span class="back-link" id="btn-back-from-register">← 返回首页</span>
        </div>
    </div>
</div>

<!-- 聊天页 -->
<div id="chat-page" class="page">
    <aside class="online-sidebar">
        <div class="sidebar-header">
            <span>🌟 在线成员</span>
            <span id="sidebar-count" style="font-size:12px; color:var(--text-dim);">0</span>
        </div>
        <div class="online-list" id="online-users-list"></div>
    </aside>
    <main class="chat-main">
        <div class="chat-header">
            <div class="chat-header-left">
                <span class="header-logo">✨</span>
                <span class="header-title">公共大厅</span>
                <div class="online-badge" id="online-badge">💫 0 人在线</div>
            </div>
            <div style="display: flex; align-items: center; gap: 16px;">
                <span id="current-nickname" style="color: var(--accent-light);"></span>
                <button class="btn-icon" id="btn-go-profile" title="个人信息">👤</button>
                <button class="btn-icon" id="btn-logout" title="退出">🚪</button>
            </div>
        </div>
        <div class="messages-area" id="messages-area"></div>
        <div class="input-area">
            <button class="btn-icon" id="btn-emoji" title="表情">😊</button>
            <input type="text" id="message-input" placeholder="输入消息，Enter 发送..." maxlength="500">
            <button class="btn-send" id="btn-send">发 送</button>
            <emoji-picker id="emoji-picker"></emoji-picker>
        </div>
    </main>
</div>

<!-- 个人信息页 -->
<div id="profile-page" class="page" style="flex-direction: column;">
    <div class="profile-header">
        <span style="color: var(--accent-light); font-weight: bold;">👤 个人信息</span>
        <button class="btn-icon" id="btn-back-profile" title="返回聊天">←</button>
    </div>
    <div class="profile-body">
        <div class="info-card">
            <h3>头像</h3>
            <div class="avatar-upload">
                <div class="avatar-preview" id="avatar-preview"></div>
                <label class="upload-btn">
                    上传新头像
                    <input type="file" id="avatar-input" accept="image/*" style="display: none;">
                </label>
            </div>
        </div>
        <div class="info-card">
            <h3>基本信息</h3>
            <div class="info-row" style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                <span style="color: var(--text-dim);">用户名</span>
                <span id="profile-username">—</span>
            </div>
            <div class="info-row" style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                <span style="color: var(--text-dim);">昵称</span>
                <span id="profile-nickname">—</span>
            </div>
            <div class="info-row" style="display: flex; justify-content: space-between;">
                <span style="color: var(--text-dim);">注册时间</span>
                <span id="profile-created">—</span>
            </div>
        </div>
        <div class="info-card">
            <h3>修改昵称</h3>
            <div class="profile-form">
                <input type="text" id="new-nickname" placeholder="输入新昵称（最多20字）" maxlength="20">
                <span class="form-tip" id="nickname-tip"></span>
                <button class="btn-save" id="btn-save-nickname">保存</button>
            </div>
        </div>
        <div class="info-card">
            <h3>修改密码</h3>
            <div class="profile-form">
                <input type="password" id="old-password" placeholder="原密码">
                <input type="password" id="new-password" placeholder="新密码（至少6位）">
                <input type="password" id="confirm-password" placeholder="确认新密码">
                <span class="form-tip" id="password-tip"></span>
                <button class="btn-save" id="btn-save-password">更新密码</button>
            </div>
        </div>
        <div class="info-card">
            <h3>查询用户</h3>
            <div class="search-row">
                <input type="text" id="search-username" placeholder="输入用户名">
                <button class="btn-search" id="btn-search">查询</button>
            </div>
            <div class="search-result" id="search-result">
                <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
                    <span style="color: var(--text-dim);">用户名</span>
                    <span id="result-username">—</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
                    <span style="color: var(--text-dim);">昵称</span>
                    <span id="result-nickname">—</span>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span style="color: var(--text-dim);">注册时间</span>
                    <span id="result-created">—</span>
                </div>
            </div>
            <span class="form-tip" id="search-tip" style="margin-top: 10px;"></span>
        </div>
    </div>
</div>

<script>
    // === 星空背景 ===
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];
    const STAR_COUNT = 120;
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    for (let i = 0; i < STAR_COUNT; i++) {
        stars.push({
            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
            r: Math.random() * 1.5 + 0.5,
            dx: (Math.random() - 0.5) * 0.4, dy: (Math.random() - 0.5) * 0.4
        });
    }
    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(star => {
            ctx.beginPath(); ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
            ctx.fillStyle = '#a78bfa'; ctx.fill();
            stars.forEach(s => {
                const dist = Math.hypot(star.x - s.x, star.y - s.y);
                if (dist < 100) {
                    ctx.beginPath(); ctx.moveTo(star.x, star.y); ctx.lineTo(s.x, s.y);
                    ctx.strokeStyle = `rgba(167, 139, 250, ${0.08 - dist/2000})`; ctx.stroke();
                }
            });
        });
    }
    function updateStars() {
        stars.forEach(star => {
            star.x += star.dx; star.y += star.dy;
            if (star.x < 0 || star.x > canvas.width) star.dx *= -1;
            if (star.y < 0 || star.y > canvas.height) star.dy *= -1;
        });
    }
    function animate() { drawStars(); updateStars(); requestAnimationFrame(animate); }
    animate();

    // === 全局函数 ===
    function escapeHtml(text) { const d = document.createElement('div'); d.appendChild(document.createTextNode(text)); return d.innerHTML; }
    function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function avatarUrl(url) { return url ? (url.startsWith('/') ? url : '/uploads/' + url) : ''; }

    let socket = null;
    let currentUser = null;
    let onlineUsers = [];

    // 提示音

    function playNotif() { notifSound.currentTime = 0; notifSound.play().catch(() => {}); }

    // Socket
    function connectSocket() {
        const token = sessionStorage.getItem('token');
        if (socket) { socket.disconnect(); socket = null; }
        socket = io({ auth: { token } });
        socket.on('connect', () => {
            showPage('chat-page');
            document.getElementById('current-nickname').textContent = currentUser.nickname;
        });
        socket.on('connect_error', () => {
            alert('连接失败，请重新登录');
            sessionStorage.removeItem('token'); sessionStorage.removeItem('user');
            currentUser = null; showPage('login-page');
        });
        socket.on('history', (msgs) => { document.getElementById('messages-area').innerHTML = ''; msgs.forEach(appendMessage); scrollToBottom(); });
        socket.on('new_message', (msg) => { appendMessage(msg); scrollToBottom(); playNotif(); });
        socket.on('system', (data) => { appendSystemMsg(data.message); document.getElementById('online-badge').innerHTML = `💫 ${data.online_count} 人在线`; scrollToBottom(); });
        socket.on('users_list', (users) => { onlineUsers = users; renderOnlineList(); document.getElementById('sidebar-count').textContent = users.length; document.getElementById('online-badge').innerHTML = `💫 ${users.length} 人在线`; });
        socket.on('error', (data) => alert(data.message));
    }

    function renderOnlineList() {
        const list = document.getElementById('online-users-list');
        list.innerHTML = onlineUsers.map(u => `
            <div class="online-user" data-id="${u.id}">
                <div class="online-avatar" style="background-image: url('${avatarUrl(u.avatar)}');">
                    ${!u.avatar ? (u.nickname || u.username)[0].toUpperCase() : ''}
                </div>
                <span class="online-nickname">${escapeHtml(u.nickname)}</span>
                <span class="online-status"></span>
            </div>
        `).join('');
    }

    function sendMessage() {
        const input = document.getElementById('message-input');
        const content = input.value.trim();
        if (!content || !socket?.connected) return;
        socket.emit('send_message', { content });
        input.value = '';
    }

    function appendMessage(msg) {
        const area = document.getElementById('messages-area');
        const isSelf = currentUser && msg.user_id === currentUser.id;
        // ---- 智能日期格式 ----
        const msgDate = new Date(msg.created_at);
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const yesterday = new Date(today.getTime() - 86400000);
        const msgDay = new Date(msgDate.getFullYear(), msgDate.getMonth(), msgDate.getDate());

        let time;
        if (msgDay.getTime() === today.getTime()) {
            time = msgDate.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        } else if (msgDay.getTime() === yesterday.getTime()) {
            time = '昨天 ' + msgDate.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        } else {
            time = msgDate.getFullYear() + '-' +
                String(msgDate.getMonth() + 1).padStart(2, '0') + '-' +
                String(msgDate.getDate()).padStart(2, '0') + ' ' +
                msgDate.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }
    // -------------------

        const avatar = msg.avatar ? `background-image:url('${avatarUrl(msg.avatar)}')` : '';
        const avatarChar = !msg.avatar ? msg.nickname.charAt(0).toUpperCase() : '';
        area.insertAdjacentHTML('beforeend', `
            <div class="message-item ${isSelf ? 'self' : ''}">
                <div class="message-avatar" style="${avatar}">${avatarChar}</div>
                <div class="message-content">
                    <div class="message-meta"><span>${escapeHtml(msg.nickname)}</span><span>${time}</span></div>
                    <div class="message-bubble">${escapeHtml(msg.content)}</div>
                </div>
            </div>
        `);
    }

    function appendSystemMsg(text) {
        document.getElementById('messages-area').insertAdjacentHTML('beforeend', `<div style="text-align:center;color:var(--text-dim);margin:10px;">── ${escapeHtml(text)} ──</div>`);
    }

    function scrollToBottom() {
        const area = document.getElementById('messages-area');
        area.scrollTop = area.scrollHeight;
    }

    // 表情
    const picker = document.getElementById('emoji-picker');
    document.getElementById('btn-emoji').addEventListener('click', () => picker.style.display = picker.style.display === 'none' ? 'block' : 'none');
    picker.addEventListener('emoji-click', e => { document.getElementById('message-input').value += e.detail.unicode; picker.style.display = 'none'; });

    // 事件绑定
    window.addEventListener('DOMContentLoaded', () => {
        document.getElementById('btn-enter').addEventListener('click', () => showPage('login-page'));
        document.getElementById('btn-login').addEventListener('click', login);
        document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
        document.getElementById('btn-go-register').addEventListener('click', () => showPage('register-page'));
        document.getElementById('btn-back-from-login').addEventListener('click', () => showPage('welcome-page'));
        document.getElementById('btn-register').addEventListener('click', register);
        document.getElementById('btn-go-login').addEventListener('click', () => showPage('login-page'));
        document.getElementById('btn-back-from-register').addEventListener('click', () => showPage('welcome-page'));

        document.getElementById('btn-go-profile').addEventListener('click', goProfile);
        document.getElementById('btn-logout').addEventListener('click', logout);
        document.getElementById('btn-back-profile').addEventListener('click', () => showPage('chat-page'));
        document.getElementById('btn-save-nickname').addEventListener('click', updateNickname);
        document.getElementById('btn-save-password').addEventListener('click', updatePassword);
        document.getElementById('btn-search').addEventListener('click', searchUser);

        document.getElementById('avatar-input').addEventListener('change', uploadAvatar);

    async function register() {
        const username = document.getElementById('reg-username').value.trim();
        const nickname = document.getElementById('reg-nickname').value.trim();
        const password = document.getElementById('reg-password').value;
        const errEl = document.getElementById('register-error');
        errEl.textContent = '';
        if (!username || !nickname || !password) { errEl.textContent = '所有字段都必须填写'; return; }
        try {
            const res = await fetch('/api/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username,nickname,password}) });
            const data = await res.json();
            if (res.ok) { alert('注册成功！请登录'); showPage('login-page'); }
            else errEl.textContent = data.error || '注册失败';
        } catch { errEl.textContent = '网络错误'; }
    }

    async function login() {
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;
        const errEl = document.getElementById('login-error');
        errEl.textContent = '';
        if (!username || !password) { errEl.textContent = '请输入用户名和密码'; return; }
        try {
            const res = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username,password}) });
            const data = await res.json();
            if (res.ok) {
                sessionStorage.setItem('token', data.access_token);
                sessionStorage.setItem('user', JSON.stringify(data.user));
                currentUser = data.user;
                connectSocket();
            } else errEl.textContent = data.error || '登录失败';
        } catch { errEl.textContent = '网络错误'; }
    }

    function logout() {
        if (socket) { socket.disconnect(); socket = null; }
        sessionStorage.removeItem('token'); sessionStorage.removeItem('user');
        currentUser = null; showPage('welcome-page');
        document.getElementById('messages-area').innerHTML = '';
    }

    function goProfile() { showPage('profile-page'); loadProfile(); }

    async function loadProfile() {
        const token = sessionStorage.getItem('token');
        try {
            const res = await fetch('/api/user/profile', { headers:{'Authorization':'Bearer '+token} });
            const data = await res.json();
            if (res.ok) {
                const u = data.user;
                document.getElementById('profile-username').textContent = u.username;
                document.getElementById('profile-nickname').textContent = u.nickname;
                document.getElementById('profile-created').textContent = new Date(u.created_at).toLocaleString('zh-CN');
                document.getElementById('new-nickname').value = u.nickname;
                const preview = document.getElementById('avatar-preview');
                if (u.avatar) { preview.style.backgroundImage = `url(${avatarUrl(u.avatar)})`; preview.textContent = ''; }
                else { preview.style.backgroundImage = ''; preview.textContent = u.nickname.charAt(0).toUpperCase(); }
            }
        } catch (e) { console.error(e); }
    }

    async function updateNickname() {
        const nickname = document.getElementById('new-nickname').value.trim();
        const tip = document.getElementById('nickname-tip');
        tip.className = 'form-tip'; tip.textContent = '';
        if (!nickname) { tip.className = 'form-tip error'; tip.textContent = '昵称不能为空'; return; }
        const token = sessionStorage.getItem('token');
        try {
            const res = await fetch('/api/user/profile', { method:'PUT', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}, body: JSON.stringify({nickname}) });
            const data = await res.json();
            if (res.ok) {
                tip.className = 'form-tip success'; tip.textContent = '修改成功';
                currentUser.nickname = data.user.nickname;
                sessionStorage.setItem('user', JSON.stringify(currentUser));
                document.getElementById('current-nickname').textContent = currentUser.nickname;
                document.getElementById('profile-nickname').textContent = currentUser.nickname;
            } else { tip.className = 'form-tip error'; tip.textContent = data.error || '修改失败'; }
        } catch { tip.className = 'form-tip error'; tip.textContent = '网络错误'; }
    }

    async function updatePassword() {
        const oldPwd = document.getElementById('old-password').value;
        const newPwd = document.getElementById('new-password').value;
        const confirm = document.getElementById('confirm-password').value;
        const tip = document.getElementById('password-tip');
        tip.className = 'form-tip'; tip.textContent = '';
        if (!oldPwd || !newPwd || !confirm) { tip.className = 'form-tip error'; tip.textContent = '所有字段都必须填写'; return; }
        if (newPwd !== confirm) { tip.className = 'form-tip error'; tip.textContent = '两次新密码不一致'; return; }
        if (newPwd.length < 6) { tip.className = 'form-tip error'; tip.textContent = '新密码不能少于6位'; return; }
        const token = sessionStorage.getItem('token');
        try {
            const res = await fetch('/api/user/profile/password', { method:'PUT', headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}, body: JSON.stringify({old_password:oldPwd, new_password:newPwd}) });
            const data = await res.json();
            if (res.ok) { tip.className = 'form-tip success'; tip.textContent = '密码修改成功'; document.getElementById('old-password').value = document.getElementById('new-password').value = document.getElementById('confirm-password').value = ''; }
            else { tip.className = 'form-tip error'; tip.textContent = data.error || '修改失败'; }
        } catch { tip.className = 'form-tip error'; tip.textContent = '网络错误'; }
    }

    async function searchUser() {
        const username = document.getElementById('search-username').value.trim();
        const tip = document.getElementById('search-tip');
        const box = document.getElementById('search-result');
        tip.className = 'form-tip'; tip.textContent = ''; box.classList.remove('show');
        if (!username) { tip.className = 'form-tip error'; tip.textContent = '请输入用户名'; return; }
        const token = sessionStorage.getItem('token');
        try {
            const res = await fetch(`/api/user/search?username=${encodeURIComponent(username)}`, { headers:{'Authorization':'Bearer '+token} });
            const data = await res.json();
            if (res.ok) {
                const u = data.user;
                document.getElementById('result-username').textContent = u.username;
                document.getElementById('result-nickname').textContent = u.nickname;
                document.getElementById('result-created').textContent = new Date(u.created_at).toLocaleString('zh-CN');
                box.classList.add('show');
            } else { tip.className = 'form-tip error'; tip.textContent = data.error || '查询失败'; }
        } catch { tip.className = 'form-tip error'; tip.textContent = '网络错误'; }
    }

    async function uploadAvatar() {
        const file = document.getElementById('avatar-input').files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append('avatar', file);
        const token = sessionStorage.getItem('token');
        try {
            const res = await fetch('/api/user/avatar', { method:'POST', headers:{'Authorization':'Bearer '+token}, body: formData });
            const data = await res.json();
            if (res.ok) {
                currentUser.avatar = data.avatar;
                sessionStorage.setItem('user', JSON.stringify(currentUser));
                const preview = document.getElementById('avatar-preview');
                preview.style.backgroundImage = `url(${avatarUrl(data.avatar)})`;
                preview.textContent = '';
                // 也更新聊天区头像（通过刷新在线列表或重连）
                if (socket && socket.connected) {
                    // 简单更新本地显示，下次重连或刷新会自动获取
                }
            } else alert(data.error || '上传失败');
        } catch { alert('网络错误'); }
    }
