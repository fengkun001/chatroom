<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天室</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #0c0a00;
            color: #fbbf24;
            height: 100vh;
            overflow: hidden;
        }

        .page { display: none; width: 100%; height: 100vh; }
        .page.active { display: flex; align-items: center; justify-content: center; }
        #chat-page.active,
        #profile-page.active {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
        }

        /* ── 欢迎页 ── */
        .welcome-bg {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            background: #0c0a00;
            position: relative;
            overflow: hidden;
        }
        .welcome-bg::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(217,119,6,0.15) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .welcome-logo { font-size: 72px; line-height: 1; }
        .welcome-title {
            font-size: 42px; font-weight: bold;
            color: #fbbf24; letter-spacing: 6px;
            text-shadow: 0 0 30px rgba(251,191,36,0.4);
        }
        .welcome-sub { font-size: 16px; color: #92400e; letter-spacing: 3px; }
        .welcome-line {
            width: 120px; height: 2px;
            background: linear-gradient(90deg, transparent, #f59e0b, transparent);
        }
        .btn-enter {
            margin-top: 16px;
            padding: 16px 56px;
            background: transparent;
            border: 2px solid #f59e0b;
            color: #fbbf24;
            font-size: 18px; letter-spacing: 4px;
            cursor: pointer; border-radius: 4px;
            transition: all 0.3s;
            position: relative; overflow: hidden;
        }
        .btn-enter::before {
            content: '';
            position: absolute; inset: 0;
            background: #f59e0b;
            transform: scaleX(0); transform-origin: left;
            transition: transform 0.3s; z-index: -1;
        }
        .btn-enter:hover { color: #0c0a00; }
        .btn-enter:hover::before { transform: scaleX(1); }

        /* ── 登录/注册卡片 ── */
        .auth-card {
            background: #1c1400;
            border: 1px solid #451a03;
            border-radius: 12px;
            padding: 44px 40px; width: 420px;
            box-shadow: 0 0 60px rgba(217,119,6,0.15);
        }
        .auth-card h1 {
            text-align: center; color: #fbbf24;
            font-size: 26px; margin-bottom: 6px; letter-spacing: 2px;
        }
        .auth-subtitle {
            text-align: center; color: #92400e;
            font-size: 13px; margin-bottom: 32px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; margin-bottom: 7px;
            color: #d97706; font-size: 13px; letter-spacing: 1px;
        }
        .form-group input {
            width: 100%; padding: 12px 16px;
            background: #0c0a00; border: 1px solid #451a03;
            border-radius: 6px; color: #fbbf24;
            font-size: 15px; outline: none; transition: border-color 0.3s;
        }
        .form-group input:focus { border-color: #f59e0b; }
        .form-group input::placeholder { color: #451a03; }
        .error-msg {
            color: #ef4444; font-size: 13px;
            min-height: 20px; margin-bottom: 12px; text-align: center;
        }
        .btn-primary {
            width: 100%; padding: 13px;
            background: #d97706; border: none; border-radius: 6px;
            color: #0c0a00; font-size: 16px; font-weight: bold;
            cursor: pointer; letter-spacing: 2px;
            margin-bottom: 12px; transition: background 0.2s;
        }
        .btn-primary:hover { background: #f59e0b; }
        .btn-ghost {
            width: 100%; padding: 11px;
            background: transparent; border: 1px solid #451a03;
            border-radius: 6px; color: #92400e;
            font-size: 14px; cursor: pointer; transition: all 0.2s;
        }
        .btn-ghost:hover { border-color: #d97706; color: #fbbf24; }
        .back-link {
            display: block; text-align: center;
            margin-top: 20px; color: #451a03;
            font-size: 13px; cursor: pointer; transition: color 0.2s;
        }
        .back-link:hover { color: #d97706; }

        /* ── 聊天室顶栏 ── */
        .chat-header {
            background: #1c1400; border-bottom: 1px solid #451a03;
            padding: 0 24px; height: 60px;
            display: flex; align-items: center;
            justify-content: space-between; flex-shrink: 0;
        }
        .chat-header-left { display: flex; align-items: center; gap: 12px; }
        .header-logo { font-size: 22px; }
        .header-title { font-size: 18px; color: #fbbf24; letter-spacing: 2px; }
        .online-badge {
            display: flex; align-items: center; gap: 6px;
            background: #451a03; padding: 4px 12px;
            border-radius: 20px; font-size: 13px; color: #d97706;
        }
        .online-dot {
            width: 7px; height: 7px;
            background: #f59e0b; border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity:1; transform:scale(1); }
            50% { opacity:0.5; transform:scale(0.85); }
        }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .nickname-tag { font-size: 14px; color: #d97706; }
        .btn-header {
            padding: 6px 14px;
            background: transparent; border: 1px solid #451a03;
            border-radius: 4px; color: #92400e;
            font-size: 13px; cursor: pointer; transition: all 0.2s;
        }
        .btn-header:hover { border-color: #d97706; color: #fbbf24; }

        /* ── 消息列表 ── */
        .messages-area {
            flex: 1; overflow-y: auto;
            padding: 24px 20px;
            display: flex; flex-direction: column; gap: 14px;
            background: #0c0a00;
        }
        .messages-area::-webkit-scrollbar { width: 4px; }
        .messages-area::-webkit-scrollbar-track { background: transparent; }
        .messages-area::-webkit-scrollbar-thumb { background: #451a03; border-radius: 4px; }
        .system-msg {
            text-align: center; color: #451a03;
            font-size: 12px; letter-spacing: 1px;
        }
        .message-item { display: flex; gap: 10px; max-width: 68%; }
        .message-item.self { align-self: flex-end; flex-direction: row-reverse; }
        .avatar {
            width: 38px; height: 38px; border-radius: 50%;
            background: #451a03; border: 1px solid #d97706;
            display: flex; align-items: center; justify-content: center;
            color: #fbbf24; font-size: 15px; font-weight: bold; flex-shrink: 0;
        }
        .message-item.self .avatar { background: #d97706; border-color: #f59e0b; color: #0c0a00; }
        .message-content { display: flex; flex-direction: column; gap: 5px; }
        .message-item.self .message-content { align-items: flex-end; }
        .message-meta { font-size: 12px; color: #451a03; }
        .message-bubble {
            padding: 10px 14px; border-radius: 10px;
            font-size: 15px; line-height: 1.6; word-break: break-all;
            background: #1c1400; border: 1px solid #451a03; color: #fcd34d;
        }
        .message-item.self .message-bubble {
            background: #451a03; border-color: #d97706; color: #fef3c7;
        }

        /* ── 输入区域 ── */
        .input-area {
            padding: 16px 20px; background: #1c1400;
            border-top: 1px solid #451a03;
            display: flex; gap: 12px; align-items: center; flex-shrink: 0;
        }
        .input-area input {
            flex: 1; padding: 11px 18px;
            background: #0c0a00; border: 1px solid #451a03;
            border-radius: 24px; color: #fbbf24;
            font-size: 15px; outline: none; transition: border-color 0.3s;
        }
        .input-area input:focus { border-color: #f59e0b; }
        .input-area input::placeholder { color: #451a03; }
        .btn-send {
            padding: 11px 26px; background: #d97706;
            border: none; border-radius: 24px;
            color: #0c0a00; font-size: 15px; font-weight: bold;
            cursor: pointer; letter-spacing: 1px;
            transition: background 0.2s; white-space: nowrap;
        }
        .btn-send:hover { background: #f59e0b; }

        /* ── 个人信息页 ── */
        .profile-header {
            background: #1c1400; border-bottom: 1px solid #451a03;
            padding: 0 24px; height: 60px;
            display: flex; align-items: center;
            justify-content: space-between; flex-shrink: 0;
        }
        .profile-header-title { font-size: 18px; color: #fbbf24; letter-spacing: 2px; }
        .profile-body {
            flex: 1; overflow-y: auto;
            padding: 32px 24px; background: #0c0a00;
            display: flex; flex-direction: column; gap: 24px;
            max-width: 640px; width: 100%; margin: 0 auto;
        }
        .info-card {
            background: #1c1400; border: 1px solid #451a03; border-radius: 10px; padding: 24px;
        }
        .info-card h3 {
            color: #d97706; font-size: 14px; letter-spacing: 2px;
            margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #451a03;
        }
        .info-row {
            display: flex; align-items: center;
            padding: 10px 0; border-bottom: 1px solid #2a1e00; gap: 12px;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #92400e; font-size: 13px; width: 80px; flex-shrink: 0; }
        .info-value { color: #fcd34d; font-size: 15px; flex: 1; }
        .profile-form { display: flex; flex-direction: column; gap: 14px; }
        .profile-form input {
            width: 100%; padding: 11px 16px;
            background: #0c0a00; border: 1px solid #451a03;
            border-radius: 6px; color: #fbbf24;
            font-size: 14px; outline: none; transition: border-color 0.3s;
        }
        .profile-form input:focus { border-color: #f59e0b; }
        .profile-form input::placeholder { color: #451a03; }
        .btn-save {
            padding: 11px 28px; background: #d97706;
            border: none; border-radius: 6px;
            color: #0c0a00; font-size: 14px; font-weight: bold;
            cursor: pointer; letter-spacing: 1px;
            align-self: flex-start; transition: background 0.2s;
        }
        .btn-save:hover { background: #f59e0b; }
        .form-tip { font-size: 12px; min-height: 18px; }
        .form-tip.success { color: #34d399; }
        .form-tip.error   { color: #ef4444; }
        .search-row { display: flex; gap: 10px; }
        .search-row input {
            flex: 1; padding: 11px 16px;
            background: #0c0a00; border: 1px solid #451a03;
            border-radius: 6px; color: #fbbf24;
            font-size: 14px; outline: none; transition: border-color 0.3s;
        }
        .search-row input:focus { border-color: #f59e0b; }
        .search-row input::placeholder { color: #451a03; }
        .btn-search {
            padding: 11px 20px; background: #451a03;
            border: 1px solid #d97706; border-radius: 6px;
            color: #fbbf24; font-size: 14px; cursor: pointer;
            white-space: nowrap; transition: background 0.2s;
        }
        .btn-search:hover { background: #d97706; color: #0c0a00; }
        .search-result {
            margin-top: 14px; padding: 16px;
            background: #0c0a00; border: 1px solid #451a03;
            border-radius: 8px; display: none;
        }
        .search-result.show { display: block; }
        .search-result-row {
            display: flex; justify-content: space-between;
            padding: 6px 0; font-size: 14px; border-bottom: 1px solid #1c1400;
        }
        .search-result-row:last-child { border-bottom: none; }
        .search-result-row span:first-child { color: #92400e; }
        .search-result-row span:last-child  { color: #fcd34d; }
    </style>
</head>
<body>

<!-- ══ 欢迎页 ══ -->
<div id="welcome-page" class="page active">
    <div class="welcome-bg">
        <div class="welcome-logo">🔥</div>
        <div class="welcome-title">公共聊天室</div>
        <div class="welcome-line"></div>
        <div class="welcome-sub">OPEN CHAT ROOM · 所有人都能看到你的消息</div>
        <button class="btn-enter" id="btn-enter">进 入 聊 天 室</button>
    </div>
</div>

<!-- ══ 登录页 ══ -->
<div id="login-page" class="page">
    <div class="auth-card">
        <h1>🔑 登录</h1>
        <p class="auth-subtitle">欢迎回来，请登录你的账号</p>
        <div class="form-group">
            <label>用 户 名</label>
            <input type="text" id="login-username" placeholder="请输入用户名">
        </div>
        <div class="form-group">
            <label>密 码</label>
            <input type="password" id="login-password" placeholder="请输入密码"
                   id="login-password-input">
        </div>
        <div class="error-msg" id="login-error"></div>
        <button class="btn-primary" id="btn-login">登 录</button>
        <button class="btn-ghost" id="btn-go-register">没有账号？去注册</button>
        <span class="back-link" id="btn-back-from-login">← 返回欢迎页</span>
    </div>
</div>

<!-- ══ 注册页 ══ -->
<div id="register-page" class="page">
    <div class="auth-card">
        <h1>📝 注册</h1>
        <p class="auth-subtitle">创建你的聊天室账号</p>
        <div class="form-group">
            <label>用户名（用于登录）</label>
            <input type="text" id="reg-username" placeholder="请输入用户名">
        </div>
        <div class="form-group">
            <label>昵称（聊天室显示名称）</label>
            <input type="text" id="reg-nickname" placeholder="请输入昵称">
        </div>
        <div class="form-group">
            <label>密 码</label>
            <input type="password" id="reg-password" placeholder="请输入密码">
        </div>
        <div class="error-msg" id="register-error"></div>
        <button class="btn-primary" id="btn-register">注 册</button>
        <button class="btn-ghost" id="btn-go-login">已有账号？去登录</button>
        <span class="back-link" id="btn-back-from-register">← 返回欢迎页</span>
    </div>
</div>

<!-- ══ 聊天页 ══ -->
<div id="chat-page" class="page">
    <div class="chat-header">
        <div class="chat-header-left">
            <span class="header-logo">🔥</span>
            <span class="header-title">公共聊天室</span>
            <div class="online-badge">
                <span class="online-dot"></span>
                <span id="online-count-text">1 人在线</span>
            </div>
        </div>
        <div class="header-right">
            <span class="nickname-tag" id="current-nickname"></span>
            <button class="btn-header" id="btn-go-profile">个人信息</button>
            <button class="btn-header" id="btn-logout">退出登录</button>
        </div>
    </div>
    <div class="messages-area" id="messages-area"></div>
    <div class="input-area">
        <input type="text" id="message-input"
               placeholder="输入消息，按回车发送..." maxlength="500">
        <button class="btn-send" id="btn-send">发 送</button>
    </div>
</div>

<!-- ══ 个人信息页 ══ -->
<div id="profile-page" class="page">
    <div class="profile-header">
        <span class="profile-header-title">👤 个人信息</span>
        <button class="btn-header" id="btn-back-profile">← 返回聊天室</button>
    </div>
    <div class="profile-body">
        <div class="info-card">
            <h3>· 基本信息</h3>
            <div class="info-row">
                <span class="info-label">用户名</span>
                <span class="info-value" id="profile-username">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">昵称</span>
                <span class="info-value" id="profile-nickname">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">注册时间</span>
                <span class="info-value" id="profile-created">—</span>
            </div>
        </div>
        <div class="info-card">
            <h3>· 修改昵称</h3>
            <div class="profile-form">
                <input type="text" id="new-nickname" placeholder="输入新昵称（最多20字）" maxlength="20">
                <span class="form-tip" id="nickname-tip"></span>
                <button class="btn-save" id="btn-save-nickname">保存昵称</button>
            </div>
        </div>
        <div class="info-card">
            <h3>· 修改密码</h3>
            <div class="profile-form">
                <input type="password" id="old-password" placeholder="输入原密码">
                <input type="password" id="new-password" placeholder="输入新密码（至少6位）">
                <input type="password" id="confirm-password" placeholder="再次输入新密码">
                <span class="form-tip" id="password-tip"></span>
                <button class="btn-save" id="btn-save-password">保存密码</button>
            </div>
        </div>
        <div class="info-card">
            <h3>· 查询用户</h3>
            <div class="search-row">
                <input type="text" id="search-username" placeholder="输入要查询的用户名">
                <button class="btn-search" id="btn-search">查 询</button>
            </div>
            <div class="search-result" id="search-result">
                <div class="search-result-row">
                    <span>用户名</span><span id="result-username">—</span>
                </div>
                <div class="search-result-row">
                    <span>昵称</span><span id="result-nickname">—</span>
                </div>
                <div class="search-result-row">
                    <span>注册时间</span><span id="result-created">—</span>
                </div>
            </div>
            <div class="form-tip" id="search-tip" style="margin-top:10px;"></div>
        </div>
    </div>
</div>

<script>
    /* ── 工具：转义 HTML ── */
    function escapeHtml(text) {
        const d = document.createElement('div')
        d.appendChild(document.createTextNode(text))
        return d.innerHTML
    }

    /* ── 工具：页面切换 ── */
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
        document.getElementById(id).classList.add('active')
    }

    /* ── 全局状态 ── */
    let socket = null
    let currentUser = null

    /* ══ 绑定所有按钮事件（等 DOM 加载完再绑定，100% 不会找不到元素） ══ */
    window.addEventListener('DOMContentLoaded', function () {

        /* 欢迎页 */
        document.getElementById('btn-enter').addEventListener('click', function () {
            showPage('login-page')
        })

        /* 登录页 */
        document.getElementById('btn-login').addEventListener('click', login)
        document.getElementById('login-password').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') login()
        })
        document.getElementById('btn-go-register').addEventListener('click', function () {
            showPage('register-page')
        })
        document.getElementById('btn-back-from-login').addEventListener('click', function () {
            showPage('welcome-page')
        })

        /* 注册页 */
        document.getElementById('btn-register').addEventListener('click', register)
        document.getElementById('btn-go-login').addEventListener('click', function () {
            showPage('login-page')
        })
        document.getElementById('btn-back-from-register').addEventListener('click', function () {
            showPage('welcome-page')
        })

        /* 聊天页 */
        document.getElementById('btn-send').addEventListener('click', sendMessage)
        document.getElementById('message-input').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') sendMessage()
        })
        document.getElementById('btn-go-profile').addEventListener('click', goProfile)
        document.getElementById('btn-logout').addEventListener('click', logout)

        /* 个人信息页 */
        document.getElementById('btn-back-profile').addEventListener('click', function () {
            showPage('chat-page')
        })
        document.getElementById('btn-save-nickname').addEventListener('click', updateNickname)
        document.getElementById('btn-save-password').addEventListener('click', updatePassword)
        document.getElementById('btn-search').addEventListener('click', searchUser)
        document.getElementById('search-username').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') searchUser()
        })

        /* 自动重连 */
        const token = localStorage.getItem('token')
        const user  = localStorage.getItem('user')
        if (token && user) {
            currentUser = JSON.parse(user)
            connectSocket()
        }
    })

    /* ══ 注册 ══ */
    async function register() {
        const username = document.getElementById('reg-username').value.trim()
        const nickname = document.getElementById('reg-nickname').value.trim()
        const password = document.getElementById('reg-password').value
        const errorEl  = document.getElementById('register-error')
        errorEl.textContent = ''
        if (!username || !nickname || !password) {
            errorEl.textContent = '所有字段都必须填写'; return
        }
        try {
            const res  = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, nickname, password })
            })
            const data = await res.json()
            if (res.ok) { alert('注册成功！请登录'); showPage('login-page') }
            else errorEl.textContent = data.error || '注册失败'
        } catch { errorEl.textContent = '网络错误，请重试' }
    }

    /* ══ 登录 ══ */
    async function login() {
        const username = document.getElementById('login-username').value.trim()
        const password = document.getElementById('login-password').value
        const errorEl  = document.getElementById('login-error')
        errorEl.textContent = ''
        if (!username || !password) {
            errorEl.textContent = '请输入用户名和密码'; return
        }
        try {
            const res  = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            const data = await res.json()
            if (res.ok) {
                localStorage.setItem('token', data.access_token)
                localStorage.setItem('user', JSON.stringify(data.user))
                currentUser = data.user
                connectSocket()
            } else errorEl.textContent = data.error || '登录失败'
        } catch { errorEl.textContent = '网络错误，请重试' }
    }

    /* ══ WebSocket ══ */
    function connectSocket() {
        const token = localStorage.getItem('token')
        if (socket) { socket.disconnect(); socket = null }

        socket = io({ auth: { token } })

        socket.on('connect', () => {
            showPage('chat-page')
            document.getElementById('current-nickname').textContent = currentUser.nickname
        })

        socket.on('connect_error', () => {
            alert('连接失败，请重新登录')
            localStorage.removeItem('token')
            localStorage.removeItem('user')
            currentUser = null
            showPage('login-page')
        })

        socket.on('history', (messages) => {
            document.getElementById('messages-area').innerHTML = ''
            messages.forEach(appendMessage)
            scrollToBottom()
        })

        socket.on('new_message', (msg) => {
            appendMessage(msg)
            scrollToBottom()
        })

        socket.on('system', (data) => {
            appendSystemMsg(data.message)
            document.getElementById('online-count-text').textContent =
                data.online_count + ' 人在线'
            scrollToBottom()
        })

        socket.on('error', (data) => { alert(data.message) })
    }

    /* ══ 发送消息 ══ */
    function sendMessage() {
        const input   = document.getElementById('message-input')
        const content = input.value.trim()
        if (!content) return
        if (!socket || !socket.connected) {
            alert('连接已断开，请刷新页面'); return
        }
        socket.emit('send_message', { content })
        input.value = ''
    }

    /* ══ 渲染消息 ══ */
    function appendMessage(msg) {
        const area   = document.getElementById('messages-area')
        const isSelf = currentUser && msg.user_id === currentUser.id
        const time   = new Date(msg.created_at).toLocaleTimeString(
            'zh-CN', { hour: '2-digit', minute: '2-digit' })
        const avatar = msg.nickname.charAt(0).toUpperCase()
        area.insertAdjacentHTML('beforeend', `
            <div class="message-item ${isSelf ? 'self' : ''}">
                <div class="avatar">${avatar}</div>
                <div class="message-content">
                    <div class="message-meta">${escapeHtml(msg.nickname)} · ${time}</div>
                    <div class="message-bubble">${escapeHtml(msg.content)}</div>
                </div>
            </div>`)
    }

    function appendSystemMsg(text) {
        document.getElementById('messages-area').insertAdjacentHTML(
            'beforeend', `<div class="system-msg">── ${escapeHtml(text)} ──</div>`)
    }

    function scrollToBottom() {
        const area = document.getElementById('messages-area')
        area.scrollTop = area.scrollHeight
    }

    /* ══ 退出登录 ══ */
    function logout() {
        if (socket) { socket.disconnect(); socket = null }
        localStorage.removeItem('token')
        localStorage.removeItem('user')
        currentUser = null
        document.getElementById('messages-area').innerHTML = ''
        document.getElementById('message-input').value = ''
        document.getElementById('current-nickname').textContent = ''
        showPage('welcome-page')
    }

    /* ══ 个人信息页 ══ */
    function goProfile() {
        showPage('profile-page')
        loadProfile()
    }

    async function loadProfile() {
        const token = localStorage.getItem('token')
        try {
            const res  = await fetch('/api/user/profile', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            const data = await res.json()
            if (res.ok) {
                const u = data.user
                document.getElementById('profile-username').textContent = u.username
                document.getElementById('profile-nickname').textContent = u.nickname
                document.getElementById('profile-created').textContent =
                    new Date(u.created_at).toLocaleString('zh-CN')
                document.getElementById('new-nickname').value = u.nickname
            }
        } catch (e) { console.error('加载个人信息失败', e) }
    }

    async function updateNickname() {
        const nickname = document.getElementById('new-nickname').value.trim()
        const tip      = document.getElementById('nickname-tip')
        tip.className = 'form-tip'; tip.textContent = ''
        if (!nickname) {
            tip.className = 'form-tip error'; tip.textContent = '昵称不能为空'; return
        }
        const token = localStorage.getItem('token')
        try {
            const res  = await fetch('/api/user/profile', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json',
                           'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ nickname })
            })
            const data = await res.json()
            if (res.ok) {
                tip.className = 'form-tip success'
                tip.textContent = '✓ 昵称修改成功'
                currentUser.nickname = data.user.nickname
                localStorage.setItem('user', JSON.stringify(currentUser))
                document.getElementById('current-nickname').textContent = currentUser.nickname
                document.getElementById('profile-nickname').textContent = currentUser.nickname
            } else {
                tip.className = 'form-tip error'
                tip.textContent = data.error || '修改失败'
            }
        } catch { tip.className = 'form-tip error'; tip.textContent = '网络错误' }
    }

    async function updatePassword() {
        const oldPwd     = document.getElementById('old-password').value
        const newPwd     = document.getElementById('new-password').value
        const confirmPwd = document.getElementById('confirm-password').value
        const tip        = document.getElementById('password-tip')
        tip.className = 'form-tip'; tip.textContent = ''
        if (!oldPwd || !newPwd || !confirmPwd) {
            tip.className = 'form-tip error'; tip.textContent = '所有密码字段都必须填写'; return
        }
        if (newPwd !== confirmPwd) {
            tip.className = 'form-tip error'; tip.textContent = '两次新密码不一致'; return
        }
        if (newPwd.length < 6) {
            tip.className = 'form-tip error'; tip.textContent = '新密码不能少于6位'; return
        }
        const token = localStorage.getItem('token')
        try {
            const res  = await fetch('/api/user/profile/password', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json',
                           'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ old_password: oldPwd, new_password: newPwd })
            })
            const data = await res.json()
            if (res.ok) {
                tip.className = 'form-tip success'
                tip.textContent = '✓ 密码修改成功，下次登录使用新密码'
                document.getElementById('old-password').value = ''
                document.getElementById('new-password').value = ''
                document.getElementById('confirm-password').value = ''
            } else {
                tip.className = 'form-tip error'
                tip.textContent = data.error || '修改失败'
            }
        } catch { tip.className = 'form-tip error'; tip.textContent = '网络错误' }
    }

    async function searchUser() {
        const username = document.getElementById('search-username').value.trim()
        const tip      = document.getElementById('search-tip')
        const resultBox = document.getElementById('search-result')
        tip.className = 'form-tip'; tip.textContent = ''
        resultBox.classList.remove('show')
        if (!username) {
            tip.className = 'form-tip error'; tip.textContent = '请输入要查询的用户名'; return
        }
        const token = localStorage.getItem('token')
        try {
            const res  = await fetch('/api/user/search?username=' + encodeURIComponent(username), {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            const data = await res.json()
            if (res.ok) {
                const u = data.user
                document.getElementById('result-username').textContent = u.username
                document.getElementById('result-nickname').textContent = u.nickname
                document.getElementById('result-created').textContent =
                    new Date(u.created_at).toLocaleString('zh-CN')
                resultBox.classList.add('show')
            } else {
                tip.className = 'form-tip error'
                tip.textContent = data.error || '查询失败'
            }
        } catch { tip.className = 'form-tip error'; tip.textContent = '网络错误' }
    }
</script>
</body>
</html>
